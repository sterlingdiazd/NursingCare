# Rate-limiting zone for health-check endpoints (10 req/s per IP, burst 20)
limit_req_zone $binary_remote_addr zone=health_limit:10m rate=10r/s;

server {
    listen       5050 ssl;
    server_name  _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Rate-limited health-check routes
    location /api/health/ {
        limit_req zone=health_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 5050;
    }

    location / {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 5050;
    }
}
