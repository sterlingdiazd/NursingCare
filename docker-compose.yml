services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nursingcare-sql
    environment:
      SA_PASSWORD: "${SQL_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "${DB_PORT}:1433"
    restart: always
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "${API_INTERNAL_PORT}"
    environment:
      ASPNETCORE_URLS: "http://+:${API_INTERNAL_PORT}"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=NursingCareDb;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True;"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI}"
      GOOGLE_OAUTH_FRONTEND_REDIRECT_URL: "${GOOGLE_OAUTH_FRONTEND_REDIRECT_URL}"
      GOOGLE_OAUTH_MOBILE_REDIRECT_URL: "${GOOGLE_OAUTH_MOBILE_REDIRECT_URL}"
    depends_on:
      - sqlserver

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${API_INTERNAL_PORT}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  proxy:
    image: nginx:1.27-alpine
    container_name: nursingcare-proxy
    depends_on:
      - api
    ports:
      - "${PUBLIC_API_PORT}:${PUBLIC_API_PORT}"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./nginx/certs/server.key:/etc/nginx/certs/server.key:ro

volumes:
  sqlserver-data:
