name: .NET CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily health-check at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
        ports:
          - 1433:1433

    env:
      DOTNET_NOLOGO: true
      NursingCare_TestSqlConnection: "Server=localhost,1433;Database=NursingCareDb_Test;User Id=sa;Password=${{ secrets.SA_PASSWORD }};TrustServerCertificate=True;"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/src.sln

      - name: Install sqlcmd
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc > /dev/null
          sudo add-apt-repository "$(curl -sSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list)" 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq mssql-tools18 unixodbc-dev 2>/dev/null || true
          echo "sqlcmd location: $(which sqlcmd 2>/dev/null || echo 'not in PATH')"
          ls /opt/mssql-tools*/bin/sqlcmd 2>/dev/null || echo "No sqlcmd found in /opt"

      - name: Wait for SQL Server (poll)
        timeout-minutes: 4
        env:
          SA_PWD: ${{ secrets.SA_PASSWORD }}
        run: |
          # Find sqlcmd
          SQLCMD="/opt/mssql-tools18/bin/sqlcmd"
          [ -f "$SQLCMD" ] || SQLCMD="/opt/mssql-tools/bin/sqlcmd"
          [ -f "$SQLCMD" ] || SQLCMD="$(which sqlcmd 2>/dev/null || true)"
          if [ -z "$SQLCMD" ] || [ ! -f "$SQLCMD" ]; then
            echo "ERROR: sqlcmd not found. Skipping SQL Server wait."
            exit 1
          fi
          echo "Using sqlcmd at: $SQLCMD"
          echo "Waiting for SQL Server to be ready..."
          for i in $(seq 1 48); do
            if "$SQLCMD" -S localhost,1433 -U sa -P "${SA_PWD}" -C -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready (attempt $i)."
              exit 0
            fi
            # Show error on first and every 10th attempt for debugging
            if [ "$i" = "1" ] || [ $((i % 10)) -eq 0 ]; then
              echo "Attempt $i debug output:"
              "$SQLCMD" -S localhost,1433 -U sa -P "${SA_PWD}" -C -Q "SELECT 1" 2>&1 || true
            else
              echo "Attempt $i: SQL Server not ready yet, waiting 5 s..."
            fi
            sleep 5
          done
          echo "ERROR: SQL Server did not become ready within 4 minutes."
          exit 1

      - name: Build
        run: dotnet build src/src.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/src.sln --no-build --configuration Release
