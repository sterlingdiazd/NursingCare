name: .NET CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
        ports:
          - 1433:1433

    env:
      DOTNET_NOLOGO: true
      NursingCare_TestSqlConnection: "Server=localhost,1433;Database=NursingCareDb_Test;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      SQL_PASSWORD: "YourStrong!Passw0rd"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/src.sln

      - name: Wait for SQL Server
        run: sleep 30

      - name: Build
        run: dotnet build src/src.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/src.sln --no-build --configuration Release
