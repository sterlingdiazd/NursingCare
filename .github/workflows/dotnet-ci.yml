name: .NET CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily health-check at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
        ports:
          - 1433:1433

    env:
      DOTNET_NOLOGO: true
      NursingCare_TestSqlConnection: "Server=localhost,1433;Database=NursingCareDb_Test;User Id=sa;Password=${{ secrets.SA_PASSWORD }};TrustServerCertificate=True;"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/src.sln

      - name: Wait for SQL Server (poll)
        timeout-minutes: 2
        run: |
          echo "Waiting for SQL Server to be ready..."
          for i in $(seq 1 24); do
            if /opt/mssql-tools18/bin/sqlcmd \
                -S localhost,1433 \
                -U sa \
                -P "${{ secrets.SA_PASSWORD }}" \
                -C \
                -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready (attempt $i)."
              exit 0
            fi
            echo "Attempt $i: SQL Server not ready yet, waiting 5 s..."
            sleep 5
          done
          echo "ERROR: SQL Server did not become ready within 2 minutes."
          exit 1

      - name: Build
        run: dotnet build src/src.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/src.sln --no-build --configuration Release
