name: .NET CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily health-check at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  security_scans:
    name: Security Scans (Gitleaks + Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Vulnerability Scan (FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  build_and_test:
    runs-on: ubuntu-latest
    needs: security_scans

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
        ports:
          - 1433:1433

    env:
      DOTNET_NOLOGO: true
      NursingCare_TestSqlConnection: "Server=localhost,1433;Database=NursingCareDb_Test;User Id=sa;Password=${{ secrets.SA_PASSWORD }};TrustServerCertificate=True;"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/src.sln

      - name: Wait for SQL Server (poll)
        timeout-minutes: 3
        run: |
          # sqlcmd is NOT installed on the runner host; run it inside the mssql
          # service container instead (where /opt/mssql-tools18 exists).
          echo "Locating SQL Server container..."
          CID=""
          for i in $(seq 1 12); do
            CID=$(docker ps --filter "ancestor=mcr.microsoft.com/mssql/server:2022-latest" --format "{{.ID}}" | head -1)
            [ -n "$CID" ] && break
            sleep 5
          done
          if [ -z "$CID" ]; then
            echo "ERROR: SQL Server container not found."
            docker ps
            exit 1
          fi
          echo "Waiting for SQL Server ($CID) to accept connections..."
          for i in $(seq 1 30); do
            if docker exec "$CID" /opt/mssql-tools18/bin/sqlcmd \
                -S localhost -U sa -P "${{ secrets.SA_PASSWORD }}" -C \
                -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready (attempt $i)."
              exit 0
            fi
            echo "Attempt $i: SQL Server not ready yet, waiting 5 s..."
            sleep 5
          done
          echo "ERROR: SQL Server did not become ready."
          exit 1

      - name: Build
        run: dotnet build src/src.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/src.sln --no-build --configuration Release
